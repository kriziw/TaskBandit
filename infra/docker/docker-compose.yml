services:
  postgres:
    image: postgres:16-alpine
    container_name: taskbandit-postgres
    environment:
      POSTGRES_DB: ${TASKBANDIT_DB_NAME:-taskbandit}
      POSTGRES_USER: ${TASKBANDIT_DB_USER:-taskbandit}
      POSTGRES_PASSWORD: ${TASKBANDIT_DB_PASSWORD:-taskbandit}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${TASKBANDIT_DB_USER:-taskbandit} -d ${TASKBANDIT_DB_NAME:-taskbandit}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "${TASKBANDIT_DB_HOST_PORT:-5432}:5432"
    volumes:
      - ${TASKBANDIT_DATA_ROOT:-./data}/postgres:/var/lib/postgresql/data

  server:
    image: kriziw/taskbandit:${TASKBANDIT_IMAGE_TAG:-latest}
    container_name: taskbandit-server
    environment:
      PORT: ${TASKBANDIT_PORT:-8080}
      DATABASE_URL: postgresql://${TASKBANDIT_DB_USER:-taskbandit}:${TASKBANDIT_DB_PASSWORD:-taskbandit}@postgres:5432/${TASKBANDIT_DB_NAME:-taskbandit}?schema=public
      TASKBANDIT_JWT_SECRET: ${TASKBANDIT_JWT_SECRET:-taskbandit-dev-secret-change-me}
      TASKBANDIT_JWT_EXPIRES_IN: ${TASKBANDIT_JWT_EXPIRES_IN:-7d}
      TASKBANDIT_OIDC_ENABLED: ${TASKBANDIT_OIDC_ENABLED:-false}
      TASKBANDIT_OIDC_AUTHORITY: ${TASKBANDIT_OIDC_AUTHORITY:-}
      TASKBANDIT_OIDC_CLIENT_ID: ${TASKBANDIT_OIDC_CLIENT_ID:-}
      TASKBANDIT_OIDC_CLIENT_SECRET: ${TASKBANDIT_OIDC_CLIENT_SECRET:-}
      TASKBANDIT_BOOTSTRAP_SEED_DEMO_DATA: ${TASKBANDIT_BOOTSTRAP_SEED_DEMO_DATA:-true}
      TASKBANDIT_REVERSE_PROXY_ENABLED: ${TASKBANDIT_REVERSE_PROXY_ENABLED:-false}
      TASKBANDIT_REVERSE_PROXY_PATH_BASE: ${TASKBANDIT_REVERSE_PROXY_PATH_BASE:-}
      TASKBANDIT_STORAGE_ROOT: ${TASKBANDIT_STORAGE_ROOT:-/var/lib/taskbandit/storage}
    ports:
      - "${TASKBANDIT_PORT:-8080}:${TASKBANDIT_PORT:-8080}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:${TASKBANDIT_PORT:-8080}/health || exit 1"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    pull_policy: always
    volumes:
      - ${TASKBANDIT_DATA_ROOT:-./data}/taskbandit:/var/lib/taskbandit
