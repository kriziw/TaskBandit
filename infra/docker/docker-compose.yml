# Mirror of the repository-root docker-compose.yml for quick-start downloads.
# Keep this file in sync with ../../docker-compose.yml.

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskbandit-postgres
    logging:
      driver: json-file
      options:
        max-size: ${TASKBANDIT_DOCKER_LOG_MAX_SIZE:-100m}
        max-file: "${TASKBANDIT_DOCKER_LOG_MAX_FILES:-5}"
    environment:
      POSTGRES_DB: ${TASKBANDIT_DB_NAME:-taskbandit}
      POSTGRES_USER: ${TASKBANDIT_DB_USER:-taskbandit}
      POSTGRES_PASSWORD: ${TASKBANDIT_DB_PASSWORD:-taskbandit}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${TASKBANDIT_DB_USER:-taskbandit} -d ${TASKBANDIT_DB_NAME:-taskbandit}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "${TASKBANDIT_DB_HOST_PORT:-5432}:5432"
    volumes:
      - ${TASKBANDIT_DATA_ROOT:-./data}/postgres:/var/lib/postgresql/data

  server:
    image: kriziw/taskbandit:${TASKBANDIT_IMAGE_TAG:-latest}
    container_name: taskbandit-server
    environment:
      PORT: ${TASKBANDIT_PORT:-8080}
      DATABASE_URL: postgresql://${TASKBANDIT_DB_USER:-taskbandit}:${TASKBANDIT_DB_PASSWORD:-taskbandit}@postgres:5432/${TASKBANDIT_DB_NAME:-taskbandit}?schema=public
      TASKBANDIT_PUBLIC_WEB_BASE_URL: ${TASKBANDIT_PUBLIC_WEB_BASE_URL:-http://localhost:4173}
      TASKBANDIT_PUBLIC_API_BASE_URL: ${TASKBANDIT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      TASKBANDIT_JWT_SECRET: ${TASKBANDIT_JWT_SECRET:-taskbandit-dev-secret-change-me}
      TASKBANDIT_JWT_EXPIRES_IN: ${TASKBANDIT_JWT_EXPIRES_IN:-7d}
      TASKBANDIT_FORCE_LOCAL_AUTH_ENABLED: ${TASKBANDIT_FORCE_LOCAL_AUTH_ENABLED:-false}
      TASKBANDIT_OIDC_ENABLED: ${TASKBANDIT_OIDC_ENABLED:-false}
      TASKBANDIT_OIDC_AUTHORITY: ${TASKBANDIT_OIDC_AUTHORITY:-}
      TASKBANDIT_OIDC_CLIENT_ID: ${TASKBANDIT_OIDC_CLIENT_ID:-}
      TASKBANDIT_OIDC_CLIENT_SECRET: ${TASKBANDIT_OIDC_CLIENT_SECRET:-}
      TASKBANDIT_OIDC_SCOPE: ${TASKBANDIT_OIDC_SCOPE:-openid profile email}
      TASKBANDIT_BOOTSTRAP_SEED_DEMO_DATA: ${TASKBANDIT_BOOTSTRAP_SEED_DEMO_DATA:-false}
      TASKBANDIT_PUSH_DELIVERY_INTERVAL_MS: ${TASKBANDIT_PUSH_DELIVERY_INTERVAL_MS:-60000}
      TASKBANDIT_EMAIL_DELIVERY_INTERVAL_MS: ${TASKBANDIT_EMAIL_DELIVERY_INTERVAL_MS:-60000}
      TASKBANDIT_FCM_ENABLED: ${TASKBANDIT_FCM_ENABLED:-false}
      TASKBANDIT_FCM_SERVICE_ACCOUNT_BASE64: ${TASKBANDIT_FCM_SERVICE_ACCOUNT_BASE64:-}
      TASKBANDIT_FCM_SERVICE_ACCOUNT_JSON: ${TASKBANDIT_FCM_SERVICE_ACCOUNT_JSON:-}
      TASKBANDIT_WEB_PUSH_PUBLIC_KEY: ${TASKBANDIT_WEB_PUSH_PUBLIC_KEY:-}
      TASKBANDIT_WEB_PUSH_PRIVATE_KEY: ${TASKBANDIT_WEB_PUSH_PRIVATE_KEY:-}
      TASKBANDIT_WEB_PUSH_SUBJECT: ${TASKBANDIT_WEB_PUSH_SUBJECT:-}
      TASKBANDIT_SERVE_EMBEDDED_WEB: ${TASKBANDIT_SERVE_EMBEDDED_WEB:-false}
      TASKBANDIT_CORS_ALLOWED_ORIGINS: ${TASKBANDIT_CORS_ALLOWED_ORIGINS:-}
      TASKBANDIT_REVERSE_PROXY_ENABLED: ${TASKBANDIT_REVERSE_PROXY_ENABLED:-}
      TASKBANDIT_REVERSE_PROXY_PATH_BASE: ${TASKBANDIT_REVERSE_PROXY_PATH_BASE:-}
      TASKBANDIT_STORAGE_ROOT: ${TASKBANDIT_STORAGE_ROOT:-/var/lib/taskbandit/storage}
      TASKBANDIT_RUNTIME_LOG_MAX_FILE_SIZE_MB: ${TASKBANDIT_RUNTIME_LOG_MAX_FILE_SIZE_MB:-100}
      TASKBANDIT_RUNTIME_LOG_MAX_TOTAL_SIZE_MB: ${TASKBANDIT_RUNTIME_LOG_MAX_TOTAL_SIZE_MB:-500}
      TASKBANDIT_DATA_ROOT_HINT: ${TASKBANDIT_DATA_ROOT_HINT:-${TASKBANDIT_DATA_ROOT:-./data}}
      TASKBANDIT_COMPOSE_FILE_HINT: ${TASKBANDIT_COMPOSE_FILE_HINT:-./docker-compose.yml}
      TASKBANDIT_ENV_FILE_HINT: ${TASKBANDIT_ENV_FILE_HINT:-./.env}
    ports:
      - "${TASKBANDIT_PORT:-8080}:${TASKBANDIT_PORT:-8080}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:${TASKBANDIT_PORT:-8080}/health || exit 1"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: ${TASKBANDIT_DOCKER_LOG_MAX_SIZE:-100m}
        max-file: "${TASKBANDIT_DOCKER_LOG_MAX_FILES:-5}"
    pull_policy: always
    volumes:
      - ${TASKBANDIT_DATA_ROOT:-./data}/taskbandit:/var/lib/taskbandit

  web:
    image: kriziw/taskbandit-web:${TASKBANDIT_IMAGE_TAG:-latest}
    container_name: taskbandit-web
    logging:
      driver: json-file
      options:
        max-size: ${TASKBANDIT_DOCKER_LOG_MAX_SIZE:-100m}
        max-file: "${TASKBANDIT_DOCKER_LOG_MAX_FILES:-5}"
    environment:
      TASKBANDIT_API_BASE_URL: ${TASKBANDIT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      TASKBANDIT_WEB_BASE_URL: ${TASKBANDIT_PUBLIC_WEB_BASE_URL:-http://localhost:4173}
      TASKBANDIT_ADMIN_BASE_URL: ${TASKBANDIT_PUBLIC_ADMIN_BASE_URL:-}
      TASKBANDIT_CLIENT_BASE_URL: ${TASKBANDIT_PUBLIC_CLIENT_BASE_URL:-}
    ports:
      - "${TASKBANDIT_WEB_PORT:-4173}:80"
    depends_on:
      server:
        condition: service_healthy
    pull_policy: always
