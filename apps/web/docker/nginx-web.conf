server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index client.html;

    location = /taskbandit-runtime-config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location = /client-sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /taskbandit-client.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /admin {
        return 308 /admin/;
    }

    location = /admin/taskbandit-runtime-config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location /admin/ {
        try_files $uri /admin/admin.html;
    }

    location / {
        try_files $uri $uri/ /client.html;
    }
}
