name: taskbandit-codeql

queries:
  - uses: security-extended
  - uses: security-and-quality

paths:
  - apps/android/app/src/main/java
  - apps/server/src
  - apps/web/src
  - .github/workflows

paths-ignore:
  - apps/server/prisma/migrations
  - apps/server/tsconfig.build.tsbuildinfo
  - apps/web/dist-admin
  - apps/web/dist-client
  - docs
  - output
