name: docker-publish

on:
  push:
    branches: ["main"]
    paths:
      - "apps/server/**"
      - ".github/workflows/docker-publish.yml"
      - "infra/docker/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve prerelease setting
        id: prerelease
        shell: bash
        run: |
          raw_value="${{ vars.PRE_RELEASE_SETTING }}"
          normalized="$(printf '%s' "$raw_value" | tr '[:upper:]' '[:lower:]')"

          if [[ "$normalized" =~ ^(1|true|tru|yes|y|on)$ ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kriziw/taskbandit
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=prerelease,enable=${{ steps.prerelease.outputs.value == 'true' }}
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          file: ./apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
