name: docker-publish

on:
  push:
    branches: ["main"]
    paths:
      - "apps/server/**"
      - "apps/web/**"
      - ".dockerignore"
      - ".github/workflows/docker-publish.yml"
      - "infra/docker/**"
  workflow_dispatch:

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'chore(main): release taskbandit ') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Read release version
        id: version
        shell: bash
        run: |
          echo "value=$(tr -d '\r\n' < version.txt)" >> "$GITHUB_OUTPUT"

      - name: Resolve prerelease setting
        id: prerelease
        shell: bash
        run: |
          raw_value="${{ vars.PRE_RELEASE_SETTING }}"
          normalized="$(printf '%s' "$raw_value" | tr '[:upper:]' '[:lower:]')"

          if [[ "$normalized" =~ ^(1|true|tru|yes|y|on)$ ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kriziw/taskbandit
          tags: |
            type=raw,value=latest,enable=${{ steps.prerelease.outputs.value != 'true' }}
            type=raw,value=prerelease,enable=${{ steps.prerelease.outputs.value == 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          build-args: |
            TASKBANDIT_RELEASE_VERSION=${{ steps.version.outputs.value }}
            TASKBANDIT_BUILD_NUMBER=${{ github.run_number }}
            TASKBANDIT_COMMIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
