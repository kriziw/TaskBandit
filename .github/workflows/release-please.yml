name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_version:
        description: Version to publish manually, for example 0.24.0
        required: false
        type: string
      release_sha:
        description: Commit SHA to tag and publish for a manual release backfill
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release_please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.resolve_release.outputs.release_created }}
      tag_name: ${{ steps.resolve_release.outputs.tag_name }}
      version: ${{ steps.resolve_release.outputs.version }}
      sha: ${{ steps.resolve_release.outputs.sha }}
      is_prerelease: ${{ steps.prerelease.outputs.value }}
      config_path: ${{ steps.config.outputs.path }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare local plain version compatibility tags
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags origin
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          prepared_count=0

          while IFS= read -r legacy_tag; do
            [[ -n "$legacy_tag" ]] || continue
            plain_tag="${legacy_tag#taskbandit-}"

            if git rev-parse -q --verify "refs/tags/$plain_tag" >/dev/null; then
              continue
            fi

            release_sha="$(git rev-list -n 1 "$legacy_tag")"
            git tag -a "$plain_tag" "$release_sha" -m "Compatibility release tag $plain_tag"
            prepared_count=$((prepared_count + 1))
          done < <(git tag -l 'taskbandit-v*' | sort -V)

          echo "Prepared ${prepared_count} local compatibility tag(s) for release-please."

      - name: Resolve prerelease setting
        id: prerelease
        shell: bash
        run: |
          raw_value="${{ vars.PRE_RELEASE_SETTING }}"
          normalized="$(printf '%s' "$raw_value" | tr '[:upper:]' '[:lower:]')"

          if [[ "$normalized" =~ ^(1|true|tru|yes|y|on)$ ]]; then
            value=true
          else
            value=false
          fi

          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Select release-please config
        id: config
        shell: bash
        run: |
          if [[ "${{ steps.prerelease.outputs.value }}" == "true" ]]; then
            echo "path=.github/release-please-config.prerelease.json" >> "$GITHUB_OUTPUT"
          else
            echo "path=.github/release-please-config.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect release commit
        id: release_commit
        shell: bash
        run: |
          set -euo pipefail

          manual_version="${{ inputs.release_version }}"
          manual_sha="${{ inputs.release_sha }}"

          if [[ -n "$manual_version" ]]; then
            echo "is_release_commit=true" >> "$GITHUB_OUTPUT"
            echo "version=$manual_version" >> "$GITHUB_OUTPUT"
            echo "tag_name=v$manual_version" >> "$GITHUB_OUTPUT"
            echo "sha=${manual_sha:-$GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_message="$(git log -1 --pretty=%B)"
          version="$(printf '%s\n' "$commit_message" | sed -nE 's/^chore\(main\): release (taskbandit )?([0-9]+\.[0-9]+\.[0-9]+)( \(#[0-9]+\))?$/\2/p' | head -n 1)"

          if [[ -z "$version" ]]; then
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "is_release_commit=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$version" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create or update release from release commit
        id: release_commit_publish
        if: ${{ steps.release_commit.outputs.is_release_commit == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release_commit.outputs.version }}"
          tag_name="${{ steps.release_commit.outputs.tag_name }}"
          release_sha="${{ steps.release_commit.outputs.sha }}"

          git fetch --tags origin

          if git ls-remote --exit-code --tags origin "refs/tags/$tag_name" >/dev/null 2>&1; then
            echo "Remote tag $tag_name already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            if git rev-parse -q --verify "refs/tags/$tag_name" >/dev/null; then
              git tag -d "$tag_name"
            fi
            git tag -a "$tag_name" "$release_sha" -m "Release $tag_name"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/$tag_name"
          fi

          release_notes="$(awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture=1 }
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" { exit }
            capture { print }
          ' CHANGELOG.md)"

          if [[ -z "$release_notes" ]]; then
            release_notes="## [$version](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag_name}) ($(date -u +%Y-%m-%d))"
          fi

          jq -n \
            --arg tag_name "$tag_name" \
            --arg target_commitish "$release_sha" \
            --arg name "v${version}" \
            --arg body "$release_notes" \
            --argjson prerelease ${{ steps.prerelease.outputs.value }} \
            '{tag_name: $tag_name, target_commitish: $target_commitish, name: $name, body: $body, draft: false, prerelease: $prerelease}' \
            > /tmp/release-payload.json

          release_status="$(curl -sS -o /tmp/release.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${tag_name}")"

          if [[ "$release_status" == "404" ]]; then
            curl -sS \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" \
              -d @/tmp/release-payload.json \
              > /tmp/release-upsert.json
          else
            release_id="$(jq -r '.id' /tmp/release.json)"
            curl -sS \
              -X PATCH \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -d @/tmp/release-payload.json \
              > /tmp/release-upsert.json
          fi

          echo "release_created=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"

      - name: Run release-please
        id: release
        if: ${{ steps.release_commit.outputs.is_release_commit != 'true' }}
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: ${{ steps.config.outputs.path }}
          manifest-file: .github/.release-please-manifest.json
          skip-labeling: true

      - name: Ensure release tag exists
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${{ steps.release.outputs.tag_name }}"
          release_sha="${{ steps.release.outputs.sha }}"

          git fetch --tags origin

          if git rev-parse -q --verify "refs/tags/$tag_name" >/dev/null; then
            echo "Release tag $tag_name already exists after fetch."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag_name" "$release_sha" -m "Release $tag_name"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "refs/tags/$tag_name"

      - name: Resolve final release outputs
        id: resolve_release
        shell: bash
        run: |
          if [[ "${{ steps.release_commit_publish.outputs.release_created }}" == "true" ]]; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${{ steps.release_commit_publish.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.release_commit_publish.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ steps.release_commit_publish.outputs.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.release.outputs.release_created }}" == "true" ]]; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${{ steps.release.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ steps.release.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ steps.release.outputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          fi

  release_android:
    needs: release_please
    if: ${{ needs.release_please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      TASKBANDIT_FIREBASE_APP_ID: ${{ secrets.TASKBANDIT_FIREBASE_APP_ID }}
      TASKBANDIT_FIREBASE_API_KEY: ${{ secrets.TASKBANDIT_FIREBASE_API_KEY }}
      TASKBANDIT_FIREBASE_PROJECT_ID: ${{ secrets.TASKBANDIT_FIREBASE_PROJECT_ID }}
      TASKBANDIT_FIREBASE_SENDER_ID: ${{ secrets.TASKBANDIT_FIREBASE_SENDER_ID }}
    defaults:
      run:
        working-directory: apps/android
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release_please.outputs.sha }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Configure Android signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' }}
        shell: bash
        run: |
          keystore_path="$RUNNER_TEMP/taskbandit-release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          {
            echo "TASKBANDIT_ANDROID_KEYSTORE_PATH=$keystore_path"
            echo "TASKBANDIT_ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "TASKBANDIT_ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "TASKBANDIT_ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Set Android release metadata
        shell: bash
        run: |
          {
            echo "TASKBANDIT_RELEASE_VERSION=${{ needs.release_please.outputs.version }}"
            echo "TASKBANDIT_BUILD_NUMBER=${{ github.run_number }}"
            echo "TASKBANDIT_COMMIT_SHA=${{ needs.release_please.outputs.sha }}"
          } >> "$GITHUB_ENV"

      - name: Build release APK
        run: gradle :app:assembleRelease

      - name: Collect APK metadata
        id: apk
        shell: bash
        run: |
          apk_path="$(find "$PWD/app/build/outputs/apk/release" -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No release APK was produced." >&2
            exit 1
          fi
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskbandit-release-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Attach APK to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.release_please.outputs.tag_name }}" "${{ steps.apk.outputs.path }}" --clobber

  release_docker:
    needs: release_please
    if: ${{ needs.release_please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            image: kriziw/taskbandit
            file: ./apps/server/Dockerfile
            target: runtime
          - name: admin-web
            image: kriziw/taskbandit-admin
            file: ./apps/web/Dockerfile
            target: admin-runtime
          - name: client-web
            image: kriziw/taskbandit-client
            file: ./apps/web/Dockerfile
            target: client-runtime
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release_please.outputs.sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.release_please.outputs.version }}
            type=raw,value=v${{ needs.release_please.outputs.version }}
            type=raw,value=prerelease,enable=${{ needs.release_please.outputs.is_prerelease == 'true' }}
            type=raw,value=latest,enable=${{ needs.release_please.outputs.is_prerelease != 'true' }}

      - name: Build and push image (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          build-args: |
            TASKBANDIT_RELEASE_VERSION=${{ needs.release_please.outputs.version }}
            TASKBANDIT_BUILD_NUMBER=${{ github.run_number }}
            TASKBANDIT_COMMIT_SHA=${{ needs.release_please.outputs.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
