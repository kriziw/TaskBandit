name: android-onboarding-e2e

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: android-onboarding-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  onboarding:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"
      - name: Run onboarding instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          working-directory: apps/android
          script: |
            set -eu
            adb wait-for-device
            timeout 180 bash -c 'until adb shell cmd package list packages >/dev/null 2>&1; do sleep 2; done'
            timeout 180 bash -c 'until adb shell cmd activity get-config >/dev/null 2>&1; do sleep 2; done'
            timeout 20m gradle :app:connectedDebugAndroidTest --no-daemon --stacktrace --info
      - name: Upload Android onboarding test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-onboarding-test-reports
          path: |
            apps/android/app/build/reports/androidTests/connected
            apps/android/app/build/outputs/androidTest-results/connected
          if-no-files-found: warn
