name: ci

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package.json
      - name: Install dependencies
        run: npm install
      - name: Build web app
        run: npm run build
      - name: Build admin web app
        run: npm run build:admin
      - name: Build client web app
        run: npm run build:client

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/server/package.json
      - name: Install dependencies
        run: npm install
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Build server
        run: npm run build
      - name: Test
        run: npm run test

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"
      - name: Assemble debug APK
        run: gradle :app:assembleDebug

  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            file: ./apps/server/Dockerfile
            target: runtime
          - name: web
            file: ./apps/web/Dockerfile
            target: runtime
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: false
          build-args: |
            TASKBANDIT_RELEASE_VERSION=ci
            TASKBANDIT_BUILD_NUMBER=${{ github.run_number }}
            TASKBANDIT_COMMIT_SHA=${{ github.sha }}
