name: ci

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package.json
      - name: Install dependencies
        run: npm install
      - name: Build web app
        run: npm run build
      - name: Build admin web app
        run: npm run build:admin
      - name: Build client web app
        run: npm run build:client

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/server/package.json
      - name: Install dependencies
        run: npm install
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Build server
        run: npm run build
      - name: Test
        run: npm run test

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"
      - name: Assemble debug APK
        run: gradle :app:assembleDebug

  android_onboarding_e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"
      - name: Prebuild onboarding test APKs
        run: gradle :app:assembleDebug :app:assembleDebugAndroidTest --no-daemon --stacktrace
      - name: Run onboarding instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics -camera-back none -camera-front none -partition-size 2048
          working-directory: apps/android
          script: |
            set -eu
            adb wait-for-device
            timeout 240 bash -c 'until adb shell cmd package list packages >/dev/null 2>&1; do sleep 2; done'
            timeout 240 bash -c 'until adb shell cmd activity get-config >/dev/null 2>&1; do sleep 2; done'
            timeout 240 bash -c 'until adb shell service check package 2>/dev/null | grep -q "Service package: found"; do sleep 2; done'
            timeout 240 bash -c 'until adb shell service check activity 2>/dev/null | grep -q "Service activity: found"; do sleep 2; done'
            timeout 20m gradle :app:connectedDebugAndroidTest -x :app:assembleDebug -x :app:assembleDebugAndroidTest --no-daemon --stacktrace --info
      - name: Upload Android onboarding test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-onboarding-test-reports
          path: |
            apps/android/app/build/reports/androidTests/connected
            apps/android/app/build/outputs/androidTest-results/connected
          if-no-files-found: warn

  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            file: ./apps/server/Dockerfile
            target: runtime
          - name: web
            file: ./apps/web/Dockerfile
            target: runtime
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: false
          build-args: |
            TASKBANDIT_RELEASE_VERSION=ci
            TASKBANDIT_BUILD_NUMBER=${{ github.run_number }}
            TASKBANDIT_COMMIT_SHA=${{ github.sha }}
            TASKBANDIT_IMAGE_TAG=taskbandit-${{ matrix.name }}:ci
