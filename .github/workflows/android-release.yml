name: android-release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: false
        default: main

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      TASKBANDIT_FIREBASE_APP_ID: ${{ secrets.TASKBANDIT_FIREBASE_APP_ID }}
      TASKBANDIT_FIREBASE_API_KEY: ${{ secrets.TASKBANDIT_FIREBASE_API_KEY }}
      TASKBANDIT_FIREBASE_PROJECT_ID: ${{ secrets.TASKBANDIT_FIREBASE_PROJECT_ID }}
      TASKBANDIT_FIREBASE_SENDER_ID: ${{ secrets.TASKBANDIT_FIREBASE_SENDER_ID }}
    defaults:
      run:
        working-directory: apps/android
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Configure Android signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '' }}
        shell: bash
        run: |
          keystore_path="$RUNNER_TEMP/taskbandit-release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          {
            echo "TASKBANDIT_ANDROID_KEYSTORE_PATH=$keystore_path"
            echo "TASKBANDIT_ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "TASKBANDIT_ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "TASKBANDIT_ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Read release version
        id: version
        shell: bash
        run: |
          echo "value=$(tr -d '\r\n' < ../../version.txt)" >> "$GITHUB_OUTPUT"

      - name: Set Android release metadata
        shell: bash
        run: |
          {
            echo "TASKBANDIT_RELEASE_VERSION=${{ steps.version.outputs.value }}"
            echo "TASKBANDIT_BUILD_NUMBER=${{ github.run_number }}"
            echo "TASKBANDIT_COMMIT_SHA=${{ github.sha }}"
          } >> "$GITHUB_ENV"

      - name: Build release APK
        run: gradle :app:assembleRelease

      - name: Collect APK metadata
        id: apk
        shell: bash
        run: |
          apk_path="$(find "$PWD/app/build/outputs/apk/release" -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No release APK was produced." >&2
            exit 1
          fi
          apk_name="$(basename "$apk_path")"
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"
          echo "name=$apk_name" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskbandit-release-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Note unsigned release build
        if: ${{ !(env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' && env.ANDROID_KEY_PASSWORD != '') }}
        shell: bash
        run: |
          {
            echo "## Android release signing not configured"
            echo
            echo "A release APK artifact was built, but it is unsigned because Android signing secrets are missing."
          } >> "$GITHUB_STEP_SUMMARY"
