name: normalize-release-history

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Backfill plain version tags from legacy release tags
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags origin
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          created_refs=()

          while IFS= read -r legacy_tag; do
            [[ -n "$legacy_tag" ]] || continue
            plain_tag="${legacy_tag#taskbandit-}"

            if git ls-remote --exit-code --tags origin "refs/tags/$plain_tag" >/dev/null 2>&1; then
              continue
            fi

            release_sha="$(git rev-list -n 1 "$legacy_tag")"

            if git rev-parse -q --verify "refs/tags/$plain_tag" >/dev/null; then
              git tag -d "$plain_tag"
            fi

            git tag -a "$plain_tag" "$release_sha" -m "Compatibility release tag $plain_tag"
            created_refs+=("refs/tags/$plain_tag:refs/tags/$plain_tag")
          done < <(git tag -l 'taskbandit-v*' | sort -V)

          if [[ "${#created_refs[@]}" -gt 0 ]]; then
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${created_refs[@]}"
          fi

      - name: Normalize GitHub release names
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          page=1
          updates=0

          {
            echo "## Historical release normalization"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          while :; do
            response="$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100&page=${page}")"

            count="$(jq 'length' <<<"$response")"
            if [[ "$count" == "0" ]]; then
              break
            fi

            while IFS= read -r release; do
              [[ -n "$release" ]] || continue

              release_id="$(jq -r '.id' <<<"$release")"
              current_name="$(jq -r '.name // ""' <<<"$release")"
              tag_name="$(jq -r '.tag_name' <<<"$release")"

              version=""
              if [[ "$tag_name" =~ ^taskbandit-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
                version="${BASH_REMATCH[1]}"
              elif [[ "$tag_name" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
                version="${BASH_REMATCH[1]}"
              elif [[ "$current_name" =~ ^taskbandit:\ v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
                version="${BASH_REMATCH[1]}"
              fi

              [[ -n "$version" ]] || continue

              desired_name="v${version}"
              if [[ "$current_name" == "$desired_name" ]]; then
                continue
              fi

              payload="$(jq -n --arg name "$desired_name" '{name: $name}')"

              curl -fsSL \
                -X PATCH \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
                -d "$payload" \
                >/dev/null

              echo "- Renamed release ${tag_name} to ${desired_name}" >> "$GITHUB_STEP_SUMMARY"
              updates=$((updates + 1))
            done < <(jq -c '.[]' <<<"$response")

            page=$((page + 1))
          done

          if [[ "$updates" == "0" ]]; then
            echo "- No historical release names needed normalization" >> "$GITHUB_STEP_SUMMARY"
          fi
