name: conventional-pr-title

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title for release-please
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request?.title ?? "";
            const conventionalPattern = /^(feat|fix|perf|refactor|build|ci|docs|style|test|chore|revert)(\([^)]+\))?: .+/;

            if (conventionalPattern.test(title)) {
              core.info(`PR title is release-please compatible: ${title}`);
              return;
            }

            core.setFailed(
              "Pull request titles targeting main must use a conventional prefix for squash-safe release-please behavior. " +
              "Examples: 'feat: add onboarding guide', 'fix(web): tighten settings layout', 'chore: refresh workflow docs'."
            );
