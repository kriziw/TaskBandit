name: backfill-release-tags

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Backfill missing release tags
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags origin
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          releases=(
            "taskbandit-v0.2.1 8bef6dd39416b643c62b2715c7a2105a10adfec6"
            "taskbandit-v0.4.0 ca9b6a599ea451f5a6817e55be3fae2c88557809"
            "taskbandit-v0.5.0 df010e43b102662d84dc04d891069d61e91ae2bf"
            "taskbandit-v0.6.0 84d56b9dce9e80c696638a195f558d77e1503bf6"
            "taskbandit-v0.7.0 46b5e84480d9f8306cf55d85a6dc05ae618b5606"
            "taskbandit-v0.8.0 3a799e297400b47fc50f8840f4593f7bb44f698d"
          )

          {
            echo "## Release tag backfill"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          for release in "${releases[@]}"; do
            tag_name="${release%% *}"
            commit_sha="${release##* }"
            full_sha="$(git rev-parse --verify "${commit_sha}^{commit}")"

            if git ls-remote --exit-code --tags origin "refs/tags/$tag_name" >/dev/null 2>&1; then
              echo "Tag $tag_name already exists; skipping."
              echo "- $tag_name already existed" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            git tag -a -f "$tag_name" "$full_sha" -m "Release $tag_name"

            if ! git push origin "refs/tags/$tag_name:refs/tags/$tag_name"; then
              git fetch --tags origin

              if git ls-remote --exit-code --tags origin "refs/tags/$tag_name" >/dev/null 2>&1; then
                echo "Tag $tag_name appeared on origin during push; treating as success."
                echo "- $tag_name already existed by push time" >> "$GITHUB_STEP_SUMMARY"
                continue
              fi

              echo "Failed to push $tag_name even though it still does not exist on origin." >&2
              exit 1
            fi

            echo "Created $tag_name at $full_sha"
            echo "- Created $tag_name at \`$full_sha\`" >> "$GITHUB_STEP_SUMMARY"
          done
