name: backfill-release-tags

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Explain replacement workflow
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Legacy workflow retired"
            echo
            echo "Remote historical plain-version tag backfill is no longer required."
            echo
            echo "- `release-please.yml` now prepares local compatibility tags before generating release notes."
            echo "- If you want to clean up historical GitHub release titles, run `normalize-release-history` instead."
          } >> "$GITHUB_STEP_SUMMARY"
